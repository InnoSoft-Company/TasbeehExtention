name: Greetings

on: [pull_request, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "أهلاً بك! شكراً لفتح أول Issue لك في مشروع Tasbeeh Reminder. سنقوم بمراجعتها والرد عليك في أقرب وقت. جزاك الله خيراً! ✨"
        pr-message: "أهلاً بك! شكراً لمساهمتك في مشروع Tasbeeh Reminder. سنقوم بمراجعة الكود الخاص بك قريباً جداً. تقبل الله منك! 🚀"
